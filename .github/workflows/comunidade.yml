name: 3. Comunidade e Vendas

on:
  schedule:
    - cron: '0 12 * * *' # 09:00 BRT
    - cron: '0 0 * * *'  # 21:00 BRT
  workflow_dispatch: 

jobs:
  interagir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 gspread google-genai
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_PT: ${{ secrets.GOOGLE_CREDENTIALS_PT }}
          YOUTUBE_TOKEN_PT: ${{ secrets.YOUTUBE_TOKEN_PT }}
        run: python comunidade.py
