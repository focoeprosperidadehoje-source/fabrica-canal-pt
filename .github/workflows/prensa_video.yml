name: 2. Prensa de Vídeos (Matrix)

on:
  schedule:
    - cron: '0 7,8,19,20 * * *' # 04:00, 05:00, 16:00, 17:00 BRT
  workflow_dispatch: 

jobs:
  renderizar_e_publicar:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    timeout-minutes: 30
    strategy:
      matrix:
        horario: 
          - '06:00'
          - '18:00'
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
      - run: |
          sudo apt-get update -y || true
          sudo apt-get install -y ffmpeg
          wget -q -O Anton.ttf https://github.com/google/fonts/raw/main/ofl/anton/Anton-Regular.ttf
      - run: pip install --upgrade google-api-python-client google-auth-oauthlib google-auth-httplib2 Pillow gspread pytz edge-tts
      - env:
          GOOGLE_CREDENTIALS_PT: ${{ secrets.GOOGLE_CREDENTIALS_PT }}
          YOUTUBE_TOKEN_PT: ${{ secrets.YOUTUBE_TOKEN_PT }}
          HORARIO_ALVO: ${{ matrix.horario }}
        run: python publicador.py
