name: Prensa de Shorts (Matrix)

on:
  schedule:
    - cron: '0 15,16 * * *' # 12:00, 13:00 BRT
  workflow_dispatch: 

jobs:
  renderizar_shorts:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    timeout-minutes: 30
    strategy:
      matrix:
        horario: 
          - '14:00'
      fail-fast: false

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
      - run: |
          sudo apt-get update -y || true
          sudo apt-get install -y ffmpeg
      - run: pip install --upgrade google-api-python-client google-auth-oauthlib google-auth-httplib2 gspread pytz edge-tts
      - env:
          GOOGLE_CREDENTIALS_PT: ${{ secrets.GOOGLE_CREDENTIALS_PT }}
          YOUTUBE_TOKEN_PT_SHORTS: ${{ secrets.YOUTUBE_TOKEN_PT_SHORTS }}
          HORARIO_ALVO: ${{ matrix.horario }}
        run: python publicador_shorts.py
